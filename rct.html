<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VAT on Property – Tool Suite | PwC</title>

    <!-- ============================================================
       EXTERNAL DEPENDENCIES
       ============================================================ -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- ============================================================
       DESIGN TOKENS & CSS
       All colors, spacing, and visual tokens live here.
       ============================================================ -->
    <style>
      /* ----------------------------------------------------------
       1. DESIGN TOKENS
       ---------------------------------------------------------- */
      :root {
        /* Brand */
        --pwc-orange: #d04a02;
        --pwc-orange-hover: #e05512;
        --pwc-orange-dark: #b03d00;
        --pwc-orange-light: #f26b2a;
        --pwc-orange-soft: #fff4ee;
        --pwc-orange-softer: #fffaf6;
        --pwc-black: #2d2d2d;
        --pwc-dark: #1a1a1a;
        --pwc-warm-grey: #f5f0eb;

        /* Semantic */
        --color-success: #16a34a;
        --color-success-soft: #f0fdf4;
        --color-success-muted: #bbf7d0;
        --color-danger: #dc2626;
        --color-danger-soft: #fef2f2;
        --color-danger-border: #fca5a5;
        --color-purple: #7c3aed;
        --color-purple-soft: #f5f3ff;

        /* Neutral scale */
        --grey-50: #fafaf9;
        --grey-100: #f5f5f4;
        --grey-200: #e7e5e4;
        --grey-300: #d6d3d1;
        --grey-400: #a8a29e;
        --grey-500: #78716c;
        --grey-600: #57534e;
        --grey-700: #44403c;
        --grey-800: #292524;
        --grey-900: #1c1917;

        /* Layout */
        --max-width: 1320px;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;
        --radius-full: 99px;

        /* Transitions */
        --ease-out-expo: cubic-bezier(0.21, 1.02, 0.73, 1);
      }

      /* ----------------------------------------------------------
       2. RESET & BASE
       ---------------------------------------------------------- */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #f7f4f1;
        color: var(--pwc-black);
        line-height: 1.6;
        min-height: 100vh;
      }

      ::selection {
        background: rgba(208, 74, 2, 0.15);
        color: var(--pwc-dark);
      }

      /* Focus ring for keyboard accessibility */
      :focus-visible {
        outline: 2px solid var(--pwc-orange);
        outline-offset: 2px;
        border-radius: var(--radius-sm);
      }

      button:focus:not(:focus-visible) {
        outline: none;
      }

      /* ----------------------------------------------------------
       3. SCROLLBAR
       ---------------------------------------------------------- */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--grey-300);
        border-radius: var(--radius-full);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--grey-400);
      }

      /* ----------------------------------------------------------
       4. ANIMATIONS
       ---------------------------------------------------------- */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      @keyframes pulseWidth {
        0%,
        100% {
          width: 32px;
          opacity: 0.3;
        }
        50% {
          width: 56px;
          opacity: 0.5;
        }
      }
      @keyframes slideRight {
        from {
          opacity: 0;
          transform: translateX(16px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes breathe {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(208, 74, 2, 0.12);
        }
        50% {
          box-shadow: 0 0 0 10px rgba(208, 74, 2, 0);
        }
      }
      @keyframes staggerIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      @keyframes dotPulse {
        0%,
        80%,
        100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1);
        }
      }
      @keyframes rippleExpand {
        0% {
          transform: scale(0);
          opacity: 0.5;
        }
        100% {
          transform: scale(4);
          opacity: 0;
        }
      }
      @keyframes completePop {
        0% {
          opacity: 0;
          transform: scale(0.92);
        }
        60% {
          transform: scale(1.02);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes checkMark {
        0% {
          transform: scale(0);
        }
        50% {
          transform: scale(1.2);
        }
        100% {
          transform: scale(1);
        }
      }

      .anim-fade-up {
        animation: fadeUp 0.4s var(--ease-out-expo) forwards;
      }
      .anim-slide-right {
        animation: slideRight 0.45s var(--ease-out-expo) forwards;
      }
      .anim-scale-in {
        animation: scaleIn 0.35s var(--ease-out-expo) forwards;
      }

      /* ----------------------------------------------------------
       5. TYPOGRAPHY — Answer Panel Content
       ---------------------------------------------------------- */
      .answer-content p {
        margin-bottom: 14px;
        font-size: 0.86rem;
        line-height: 1.9;
        color: var(--grey-700);
      }
      .answer-content p:last-child {
        margin-bottom: 0;
      }
      .answer-content strong {
        color: var(--pwc-black);
        font-weight: 600;
      }
      .answer-content em {
        color: var(--grey-600);
      }
      .answer-content ul {
        margin: 8px 0 16px 0;
        list-style: none;
      }
      .answer-content ul li {
        padding: 5px 0 5px 22px;
        position: relative;
        font-size: 0.86rem;
        color: var(--grey-700);
        line-height: 1.75;
      }
      .answer-content ul li::before {
        content: "";
        position: absolute;
        left: 2px;
        top: 14px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--pwc-orange);
        opacity: 0.5;
      }

      /* ----------------------------------------------------------
       6. CALLOUT BOXES (in answer content)
       ---------------------------------------------------------- */
      .callout {
        padding: 16px 20px;
        border-radius: var(--radius-md);
        margin: 18px 0;
        font-size: 0.84rem;
        line-height: 1.85;
      }
      .callout strong {
        color: var(--pwc-black);
      }
      .callout.warn {
        background: linear-gradient(135deg, #fff6ef, #ffefe3);
        border: 1px solid #fdd8b8;
        color: var(--grey-700);
      }
      .callout.info {
        background: linear-gradient(135deg, #f8f6f3, #f0ede8);
        border: 1px solid #e0d8cf;
        color: var(--grey-700);
      }
      .callout.good {
        background: linear-gradient(135deg, #f4fef7, #eafced);
        border: 1px solid #b8efc7;
        color: var(--grey-700);
      }

      /* ----------------------------------------------------------
       7. LEGISLATION PANEL (dark code-style panel)
       ---------------------------------------------------------- */
      .legislation-panel {
        background: var(--pwc-orange-soft);
        color: black;
        border-radius: var(--radius-lg);
        overflow: hidden;
        font-size: 0.82rem;
        line-height: 1.9;
      }
      .legislation-panel__header {
        padding: 14px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .legislation-panel__header span {
        font-weight: 600;
        color: black;
        font-size: 0.82rem;
      }
      .legislation-panel__body {
        padding: 20px;
        max-height: 420px;
        overflow-y: auto;
        font-family: "Georgia", "Times New Roman", "Garamond", serif;
        font-size: 0.78rem;
        line-height: 2;
        white-space: pre-wrap;
        color: var(--pwc-black);
      }
      .legislation-panel__body .hl {
        background: rgba(208, 74, 2, 0.25);
        color: black;
        border-radius: 3px;
        padding: 1px 4px;
        font-weight: 600;
      }

      /* ----------------------------------------------------------
       8. GLOSSARY TOOLTIP
       ---------------------------------------------------------- */
      .glossary-term {
        border-bottom: 1.5px dashed var(--pwc-orange);
        color: var(--pwc-orange-dark);
        cursor: help;
        font-weight: 500;
        font-style: italic;
        transition: color 0.2s;
      }
      .glossary-term:hover {
        color: var(--pwc-orange);
      }

      .glossary-tooltip {
        position: relative;
        display: inline;
      }
      .glossary-tooltip__popup {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        background: var(--pwc-dark);
        color: white;
        padding: 14px 18px;
        border-radius: var(--radius-md);
        font-size: 0.78rem;
        line-height: 1.7;
        width: 340px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
        z-index: 1000;
        animation: fadeUp 0.2s ease forwards;
      }
      .glossary-tooltip__popup::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border: 6px solid transparent;
        border-top-color: var(--pwc-dark);
      }

      /* ----------------------------------------------------------
       9. TOOL TILES (Home Page)
       ---------------------------------------------------------- */
      .tool-tile {
        background: white;
        border-radius: var(--radius-xl);
        border: 1.5px solid var(--grey-200);
        padding: 32px 28px;
        cursor: pointer;
        transition: all 0.35s var(--ease-out-expo);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .tool-tile::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--pwc-orange),
          var(--pwc-orange-light)
        );
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.4s var(--ease-out-expo);
      }
      .tool-tile:hover::before {
        transform: scaleX(1);
      }
      .tool-tile:hover {
        border-color: var(--pwc-orange);
        box-shadow:
          0 12px 40px rgba(208, 74, 2, 0.1),
          0 4px 12px rgba(0, 0, 0, 0.05);
        transform: translateY(-4px);
      }
      .tool-tile:active {
        transform: translateY(-2px);
        transition: transform 0.1s;
      }
      .tool-tile.is-disabled {
        opacity: 0.45;
        cursor: not-allowed;
        pointer-events: none;
      }
      .tool-tile.is-disabled::before {
        display: none;
      }
      .tool-tile__icon {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        flex-shrink: 0;
        transition: transform 0.3s var(--ease-out-expo);
      }
      .tool-tile:hover .tool-tile__icon {
        transform: scale(1.08) rotate(-2deg);
      }

      /* ----------------------------------------------------------
       10. QUESTION CARD
       ---------------------------------------------------------- */
      .question-card {
        background: white;
        border-radius: var(--radius-lg);
        margin-bottom: 14px;
        transition: all 0.35s var(--ease-out-expo);
      }
      .question-card.is-active {
        box-shadow:
          0 8px 32px rgba(208, 74, 2, 0.08),
          0 2px 8px rgba(0, 0, 0, 0.04);
        animation: breathe 3s ease-in-out infinite;
      }
      .question-card.is-inactive {
        opacity: 0.3;
        pointer-events: none;
      }

      /* Edit button — appears on hover for answered cards */
      .question-card__edit-btn {
        opacity: 0;
        transition:
          opacity 0.2s,
          background 0.2s;
        background: var(--grey-50);
        border: 1px solid var(--grey-200);
        color: var(--grey-500);
        padding: 4px 10px;
        border-radius: var(--radius-sm);
        font-size: 0.7rem;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
        font-family: inherit;
      }
      .question-card:hover .question-card__edit-btn {
        opacity: 1;
      }
      .question-card__edit-btn:hover {
        background: var(--pwc-orange-soft);
        border-color: var(--pwc-orange);
        color: var(--pwc-orange);
      }

      /* ----------------------------------------------------------
       11. DECISION PATH (breadcrumb trail)
       ---------------------------------------------------------- */
      .decision-path {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        margin-bottom: 20px;
        padding: 14px 18px;
        background: var(--grey-50);
        border: 1px solid var(--grey-200);
        border-radius: var(--radius-md);
      }
      .decision-path__step {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.74rem;
        font-weight: 500;
        color: var(--grey-600);
        padding: 4px 10px;
        background: white;
        border: 1px solid var(--grey-200);
        border-radius: var(--radius-sm);
      }
      .decision-path__value {
        font-weight: 700;
      }
      .decision-path__value.is-yes {
        color: var(--color-success);
      }
      .decision-path__value.is-no {
        color: var(--color-danger);
      }
      .decision-path__arrow {
        color: var(--grey-300);
        font-size: 0.7rem;
      }

      /* ----------------------------------------------------------
       12. RIPPLE EFFECT
       ---------------------------------------------------------- */
      .ripple-container {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        border-radius: inherit;
      }
      .ripple-circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(208, 74, 2, 0.08);
        animation: rippleExpand 0.6s ease-out forwards;
      }

      /* ----------------------------------------------------------
       13. TOAST NOTIFICATION
       ---------------------------------------------------------- */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: var(--pwc-dark);
        color: white;
        padding: 12px 24px;
        border-radius: var(--radius-md);
        font-size: 0.82rem;
        font-weight: 500;
        z-index: 9999;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        transition:
          transform 0.35s var(--ease-out-expo),
          opacity 0.35s;
        opacity: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .toast.is-visible {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      /* ----------------------------------------------------------
       14. MOBILE BOTTOM SHEET
       ---------------------------------------------------------- */
      .mobile-summary-bar {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: white;
        border-top: 1px solid var(--grey-200);
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
        padding: 14px 20px;
        cursor: pointer;
        align-items: center;
        justify-content: space-between;
      }
      .mobile-sheet-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        z-index: 150;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }
      .mobile-sheet-overlay.is-open {
        opacity: 1;
        pointer-events: auto;
      }
      .mobile-sheet {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 200;
        background: white;
        border-top-left-radius: var(--radius-xl);
        border-top-right-radius: var(--radius-xl);
        box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.15);
        max-height: 80vh;
        overflow-y: auto;
        transform: translateY(100%);
        transition: transform 0.35s var(--ease-out-expo);
        padding: 0 0 32px;
      }
      .mobile-sheet.is-open {
        transform: translateY(0);
      }
      .mobile-sheet__handle {
        width: 40px;
        height: 4px;
        background: var(--grey-300);
        border-radius: var(--radius-full);
        margin: 12px auto 8px;
      }

      /* ----------------------------------------------------------
       15. PRINT STYLES
       ---------------------------------------------------------- */
      @media print {
        .no-print {
          display: none !important;
        }
        body {
          background: white;
        }
        .answer-panel {
          position: relative !important;
          box-shadow: none !important;
          border: 1px solid #ddd !important;
        }
      }

      /* ----------------------------------------------------------
       16. RESPONSIVE
       ---------------------------------------------------------- */
      @media (max-width: 960px) {
        .main-grid {
          grid-template-columns: 1fr !important;
        }
        .home-grid {
          grid-template-columns: 1fr !important;
        }
        .answer-panel {
          display: none !important;
        }
        .mobile-summary-bar {
          display: flex !important;
        }
        .question-card__edit-btn {
          opacity: 1;
        }
        .glossary-tooltip__popup {
          width: 280px;
          left: 0;
          transform: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useMemo, useCallback, useRef, useEffect, Fragment } =
        React;

      /* ================================================================
   ================================================================

   SECTION A — UTILITIES & HOOKS

   Small, reusable pieces that don't depend on business logic.

   ================================================================
   ================================================================ */

      function useToast() {
        const [message, setMessage] = useState("");
        const [isVisible, setIsVisible] = useState(false);
        const timerRef = useRef(null);

        const showToast = useCallback((text, durationMs = 2500) => {
          if (timerRef.current) clearTimeout(timerRef.current);
          setMessage(text);
          setIsVisible(true);
          timerRef.current = setTimeout(() => setIsVisible(false), durationMs);
        }, []);

        const ToastElement = (
          <div
            className={`toast ${isVisible ? "is-visible" : ""}`}
            role="status"
            aria-live="polite"
          >
            {message}
          </div>
        );

        return { showToast, ToastElement };
      }

      function useRipple() {
        const [ripples, setRipples] = useState([]);

        const handleRipple = useCallback((event) => {
          const rect = event.currentTarget.getBoundingClientRect();
          const x = event.clientX - rect.left;
          const y = event.clientY - rect.top;
          const size = Math.max(rect.width, rect.height) * 0.5;
          const id = Date.now() + Math.random();

          setRipples((prev) => [...prev, { id, x, y, size }]);
          setTimeout(
            () => setRipples((prev) => prev.filter((r) => r.id !== id)),
            600,
          );
        }, []);

        const RippleElements = ripples.map((r) => (
          <div
            key={r.id}
            className="ripple-circle"
            style={{
              left: r.x - r.size / 2,
              top: r.y - r.size / 2,
              width: r.size,
              height: r.size,
            }}
          />
        ));

        return { handleRipple, RippleElements };
      }

      /* ================================================================
   URL STATE
   ================================================================ */

      function encodeStateToHash(routePath, answersState) {
        const params = new URLSearchParams();
        Object.entries(answersState).forEach(([key, value]) => {
          params.set(key, value);
        });
        const queryString = params.toString();
        return queryString ? `${routePath}?${queryString}` : routePath;
      }

      function decodeStateFromHash(hash) {
        const [routePath, queryString] = hash.split("?");
        const state = {};
        if (queryString) {
          const params = new URLSearchParams(queryString);
          params.forEach((value, key) => {
            state[key] = value;
          });
        }
        return { route: routePath || "/", state };
      }

      function useRouter() {
        const parseHash = () => {
          const raw = window.location.hash.slice(1) || "/";
          return decodeStateFromHash(raw);
        };

        const [route, setRoute] = useState(() => parseHash().route);
        const [initialUrlState] = useState(() => parseHash().state);

        useEffect(() => {
          const handleHashChange = () => {
            const { route: newRoute } = parseHash();
            setRoute(newRoute);
          };
          window.addEventListener("hashchange", handleHashChange);
          return () =>
            window.removeEventListener("hashchange", handleHashChange);
        }, []);

        const navigate = useCallback((path) => {
          window.location.hash = path;
        }, []);

        return { route, navigate, initialUrlState };
      }

      /* ================================================================
   PDF EXPORT
   ================================================================ */

      function exportToPdf(title, decisionPathHtml, outcomeHtml) {
        const printWindow = window.open("", "_blank");
        if (!printWindow) return;

        printWindow.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <title>${title} — Analysis | PwC</title>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
      <style>
        body { font-family: 'Inter', sans-serif; max-width: 800px; margin: 40px auto; padding: 0 24px; color: #2d2d2d; line-height: 1.7; }
        h1 { font-size: 1.6rem; margin-bottom: 8px; }
        .subtitle { color: #78716c; font-size: 0.85rem; margin-bottom: 32px; }

      const LAND_SALE_OUTCOMES = {
        devAgreement9: { tag: "VAT @ 9%", tagColor: "#7c3aed", tagBackground: "#f5f3ff", legislationRefs: ["s94_3"], html: `<p>Irish VAT legislation contains anti-avoidance provisions under <strong>Section 94(3) VATCA 2010</strong>. Where undeveloped land is sold and an agreement is entered into with the purchaser (or a connected person) to develop the land, the sale becomes subject to VAT.</p><p>Under <strong>Finance Act 2025</strong>, the <strong>9% rate</strong> applies to land which, when developed, will be one or more apartments in a qualifying "apartment block":</p><ul><li>Multi-storey building (minimum 2 floors)</li><li>Not less than 3 apartments</li><li>Grouped or common access</li></ul><p>On this basis, <strong>the sale should be subject to VAT at 9%</strong>.</p><div class="callout warn">⚠️ If the 9% criteria are not met, <strong>13.5%</strong> applies. The 9% rate is available until <strong>31 December 2030</strong>.</div><div class="callout info"><strong>Practical steps</strong><br/>• VAT invoice on completion (or by 15th of following month)<br/>• VAT in Vendor's return (Box T1)<br/>• Vendor entitled to VAT recovery on sale costs<br/>• PCVEs must be completed for Purchaser<br/>• VAT charging clause in Contract for Sale</div>` },
        devAgreement13: { tag: "VAT @ 13.5%", tagColor: "var(--pwc-orange)", tagBackground: "var(--pwc-orange-soft)", legislationRefs: ["s94_3"], html: `<p>Under <strong>Section 94(3) VATCA 2010</strong>, where undeveloped land is sold and an agreement is entered into with the purchaser (or a connected person) to develop the land, the sale becomes subject to VAT at <strong>13.5%</strong>.</p><div class="callout info"><strong>Practical steps</strong><br/>• VAT invoice on completion (or by 15th of following month)<br/>• VAT in Vendor's return (Box T1)<br/>• Vendor entitled to VAT recovery on sale costs<br/>• PCVEs required · VAT charging clause in Contract for Sale</div>` },
        partial9: { tag: "VAT @ 9%", tagColor: "#7c3aed", tagBackground: "#f5f3ff", legislationRefs: ["s94_2"], html: `<p>The sale of partially developed land is subject to VAT. This is land developed within the last 20 years where development is not yet <em>completed</em>.</p><p>Under <strong>Finance Act 2025</strong>, the <strong>9% rate</strong> applies where the land will be developed into qualifying apartments in an apartment block.</p><p>On this basis, <strong>the sale should be subject to VAT at 9%</strong>.</p><div class="callout warn">⚠️ If the 9% criteria are not met, <strong>13.5%</strong> applies. Available until <strong>31 December 2030</strong>.</div><div class="callout info"><strong>Practical steps</strong><br/>• VAT invoice on completion<br/>• VAT in Vendor's return (Box T1)<br/>• VAT recovery on sale costs<br/>• PCVEs required · VAT charging clause required</div>` },
        partial13: { tag: "VAT @ 13.5%", tagColor: "var(--pwc-orange)", tagBackground: "var(--pwc-orange-soft)", legislationRefs: ["s94_2"], html: `<p>The sale of partially developed land is subject to VAT at <strong>13.5%</strong>. Non-completed property within 20 years of development is liable to VAT.</p><div class="callout info"><strong>Practical steps</strong><br/>• VAT invoice on completion (or by 15th of following month)<br/>• VAT in Vendor's return (Box T1)<br/>• VAT recovery on sale costs · PCVEs required<br/>• VAT charging clause in Contract for Sale</div>` },
        completedLast5: { tag: "VAT @ 13.5%", tagColor: "var(--pwc-orange)", tagBackground: "var(--pwc-orange-soft)", legislationRefs: ["s94_2"], html: `<div class="callout warn">⚠️ Consider whether <strong>s94(2)(c)</strong> applies re: the 24-month occupation rule for second/subsequent supplies.</div><p>Land developed to completion in the last 5 years is subject to VAT at <strong>13.5%</strong>.</p><div class="callout info"><strong>Practical steps</strong><br/>• VAT invoice on completion<br/>• VAT in Vendor's return (Box T1)<br/>• VAT recovery on sale costs<br/>• PCVEs required · VAT charging clause required</div>` },
        developedOver5: { tag: "Exempt (in first instance)", tagColor: "var(--color-success)", tagBackground: "var(--color-success-soft)", legislationRefs: ["s94_2", "s94_5", "s94_6"], html: `<p>The land was completed more than 5 years ago with no significant subsequent development, so <strong>the sale should be exempt from VAT</strong>.</p><p>A <strong>Capital Goods Scheme clawback</strong> can arise if the vendor previously recovered VAT. Adjustment periods:</p><ul><li><strong>20 intervals (~20 years)</strong> — acquisition/development</li><li><strong>10 intervals (~10 years)</strong> — refurbishment</li></ul><p>Under <strong>s94(5)</strong>, the vendor can seek agreement to exercise the <strong>JOTT</strong> to prevent a clawback.</p><div class="callout info"><strong>Consider</strong><br/>• Whether vendor deducted VAT within the adjustment period<br/>• Purchaser's intended use (JOTT may not be agreed if exempt/mixed use)<br/>• If exempt, vendor <strong>cannot</strong> recover VAT on sale costs</div>` },
        contradiction: { tag: "⚠️ Contradiction", tagColor: "var(--color-danger)", tagBackground: "var(--color-danger-soft)", legislationRefs: [], html: `<p>You previously said <strong>no development agreement</strong> but now indicated there <strong>is</strong> one. Please <strong>Start Over</strong> or edit your earlier answer.</p>` },
        jottCost: { tag: "Exempt → JOTT → 13.5% (Purchaser Cost)", tagColor: "var(--pwc-orange)", tagBackground: "var(--pwc-orange-soft)", legislationRefs: ["s94_5", "s94_6"], html: `<p>The land is undeveloped with no development agreement, so <strong>the sale is exempt in the first instance</strong>.</p><p>The <strong>JOTT</strong> renders it taxable. The purchaser self-accounts at <strong>13.5%</strong> under the reverse charge.</p><ul><li>Prevents CGS clawback for vendor</li><li>Permits VAT recovery on sale costs</li></ul><div class="callout warn">⚠️ The purchaser intends to use the land for <strong>exempt or partially exempt activities</strong> — an irrecoverable VAT cost arises. The purchaser may refuse the JOTT.</div><div class="callout info"><strong>Practical steps</strong><br/>• PCVEs required (Purchaser completes page 3)<br/>• VAT clause in Contract for Sale<br/>• Purchaser self-accounts under reverse charge</div>` },
        jottNoCost: { tag: "Exempt → JOTT → 13.5% (No Cost)", tagColor: "var(--color-success)", tagBackground: "var(--color-success-soft)", legislationRefs: ["s94_5", "s94_6"], html: `<p>The land is undeveloped with no development agreement, so <strong>the sale is exempt in the first instance</strong>.</p><p>The <strong>JOTT</strong> renders it taxable. The purchaser self-accounts at <strong>13.5%</strong> under the reverse charge.</p><ul><li>Prevents CGS clawback for vendor</li><li>Permits VAT recovery on sale costs</li></ul><div class="callout good">✓ The purchaser uses the land for <strong>fully taxable purposes</strong> — no VAT cost. The purchaser should not object.</div><div class="callout info"><strong>Practical steps</strong><br/>• PCVEs required (Purchaser completes page 3)<br/>• VAT clause in Contract for Sale<br/>• Purchaser self-accounts under reverse charge</div>` },
        noJottClawback: { tag: "Exempt — No JOTT — Clawback", tagColor: "var(--color-danger)", tagBackground: "var(--color-danger-soft)", legislationRefs: ["s94_2", "s94_5"], html: `<p>The sale is <strong>exempt from VAT</strong>. As VAT was recovered on acquisition, <strong>a CGS clawback will arise</strong>.</p><div class="callout warn">⚠️ The clawback can be avoided via the <strong>JOTT</strong>, but it will not be exercised. Consider adjusting the sale price.</div><div class="callout info"><strong>Practical steps</strong><br/>• PCVEs required<br/>• No VAT clause (include "the transfer is not subject to VAT")<br/>• Vendor <strong>cannot</strong> recover VAT on sale costs</div>` },
        noJottNoClawback: { tag: "Exempt — No JOTT — No Clawback", tagColor: "var(--color-success)", tagBackground: "var(--color-success-soft)", legislationRefs: ["s94_2"], html: `<p>The sale is <strong>exempt from VAT</strong>. No VAT was recovered on acquisition, so <strong>no CGS clawback arises</strong>.</p><div class="callout info"><strong>Practical steps</strong><br/>• PCVEs required<br/>• No VAT clause (include "the transfer is not subject to VAT")<br/>• Vendor <strong>cannot</strong> recover VAT on sale costs</div>` },
      };

      const COMMERCIAL_PROPERTY_QUESTIONS = {
        cp1: { title: "Is the property a completed commercial property?", actionableHint: "Can the property be used for its designed purpose with utility services connected — even if minor finishing remains?", legislationRef: "s94_1", glossaryTerms: ["completed"], infoPreview: 'The definition of "completed" under s94(1) is specific and can differ from a practical/commercial view.', infoDetail: `<strong>Section 94(1) VATCA 2010</strong> defines "<em>completed</em>" as meaning the development has reached a state where the goods can effectively be used for their designed purposes and utility services are connected — apart from finishing or fitting work normally done by the end user.<br/><br/>If the property is <strong>not</strong> completed, it may be "incomplete" (partially developed) and subject to different rules.`, yesLabel: "Yes, it is a completed commercial property", noLabel: "No, it is not completed" },
        cp2_tob: { title: "Does the transfer of the property qualify for VAT Transfer of Business relief?", actionableHint: "Is the property being sold with a letting agreement, licence to occupy, or other assets constituting an independent business — to a VAT-registered buyer?", legislationRef: "s20_2c", glossaryTerms: ["transfer of business", "taxable person"], infoPreview: "TOB relief = not a supply for VAT = no VAT charge. But CGS implications depend on whether the underlying sale would be taxable or exempt.", infoDetail: `<strong>Section 20(2)(c) VATCA 2010</strong> provides that the transfer of a totality of assets (or part thereof) of a business to another taxable person is deemed <strong>not</strong> to be a supply for VAT purposes.<br/><br/>Current Revenue guidance provides that TOB relief may apply to the transfer of property subject to an existing letting agreement, agreement to lease, or licence to occupy — as those assets are capable of constituting an independent business.<br/><br/>However, the transfer of property <strong>of itself</strong> without additional assets (e.g. a letting agreement) cannot come within the scope of TOB relief.`, yesLabel: "Yes, it qualifies for TOB relief", noLabel: "No, it does not qualify for TOB relief" },
        cp3_underlying: { title: "In the absence of TOB relief, would the underlying sale be subject to VAT?", actionableHint: "If TOB didn't exist — would this be a taxable sale (e.g. completed <5 years, JOTT in place) or exempt?", legislationRef: "s94_2", glossaryTerms: ["capital goods scheme", "adjustment period"], infoPreview: "This determines whether CGS obligations pass to purchaser or a new period starts.", infoDetail: `Even where TOB relief applies, it is necessary to understand the <strong>underlying VAT treatment</strong> for CGS purposes.<br/><br/>If the underlying sale would be <strong>taxable</strong>: vendor's CGS obligations do <strong>not</strong> pass to purchaser; a new CGS adjustment period commences for the purchaser.<br/><br/>If the underlying sale would be <strong>exempt</strong>: the purchaser "steps into the shoes" of the vendor and inherits the vendor's CGS obligations.`, yesLabel: "Yes, the sale would be subject to VAT", noLabel: "No, the sale would not be subject to VAT" },
        cp_incomplete_confirm: { title: 'Confirm: you are advising on an "incomplete" property?', actionableHint: 'Development has occurred in the last 20 years but has not reached "completed" status under VAT law.', glossaryTerms: ["development", "completed"], infoPreview: "If this doesn't describe the property, you may need the Land Sale tool instead.", infoDetail: `An "incomplete" property is one where development has occurred within the last 20 years but the property has not yet reached the state of "<em>completed</em>" within the VAT meaning.<br/><br/>If this does not describe the property, please review your answer to the first question.`, yesLabel: "Yes, I am advising on an incomplete property", noLabel: "No, this does not relate to an incomplete property" },
        cp_no_tob_5yr: { title: "Was the property completed within the last 5 years?", actionableHint: 'Check the date of the most recent "completion" — is it within 5 years of the proposed sale?', legislationRef: "s94_2", glossaryTerms: ["completed"], infoPreview: "Completed >5 years ago = generally exempt. Completed <5 years ago = generally taxable at 13.5%.", infoDetail: `Under <strong>s94(2)(b)</strong>, a supply of completed immovable goods is exempt where the most recent completion occurred <strong>more than 5 years</strong> prior to the supply and no development has occurred in that 5-year period.<br/><br/>If completed within the last 5 years, the supply is generally <strong>taxable at 13.5%</strong> (subject to the 24-month occupation rule for second/subsequent supplies).`, yesLabel: "Yes, completed within last 5 years", noLabel: "No, completed more than 5 years ago" },
        cp_no_tob_jott: { title: "Will the Joint Option to Tax (JOTT) be exercised?", actionableHint: "Are both parties VAT-registered and willing to sign a JOTT by the 15th of the month following sale?", legislationRef: "s94_5", glossaryTerms: ["joint option for taxation", "taxable person"], infoPreview: "JOTT prevents vendor CGS clawback — but purchaser must self-account for 13.5%.", infoDetail: `Both parties must be <em>taxable persons</em> carrying on business in the State. The agreement must be in writing by the 15th of the month following supply.<br/><br/>Where exercised, the <strong>purchaser</strong> self-accounts for VAT at 13.5% under the reverse charge mechanism.<br/><br/>The JOTT can prevent a CGS clawback for the vendor.`, yesLabel: "Yes, JOTT will be exercised", noLabel: "No, JOTT will not be exercised" },
      };

      const COMMERCIAL_PROPERTY_TRAIL_LABELS = { cp1: "Completed", cp2_tob: "TOB Relief", cp3_underlying: "Underlying VAT", cp_incomplete_confirm: "Incomplete", cp_no_tob_5yr: "Completed <5 yrs", cp_no_tob_jott: "JOTT" };

      function getCommercialPropertyFlow(answers) {

      const COMMERCIAL_PROPERTY_OUTCOMES = {
        tob_taxable: { tag: "TOB Relief — Underlying Taxable", tagColor: "var(--color-success)", tagBackground: "var(--color-success-soft)", legislationRefs: ["s20_2c", "s94_2", "s64_6b"], html: `<p>In accordance with <strong>Section 20(2)(c) VATCA 2010</strong>, VAT Transfer of Business ("TOB") relief applies where there is a transfer of a business, or part of a business, capable of being operated on an independent basis to an accountable person.</p><p>The relief provides that the transfer is <strong>not a supply for VAT purposes</strong> (i.e. not subject to VAT).</p><div class="callout good">✓ On the basis the property is being sold subject to and with the benefit of a lease in place, and is being sold to a VAT-registered purchaser, <strong>TOB relief should apply</strong>.</div><p><strong>Capital Goods Scheme implications:</strong></p><p>Where the sale would be <strong>taxable in the absence of TOB relief</strong>, the vendor's CGS obligations do <strong>not</strong> pass to the purchaser. Instead, a <strong>new CGS adjustment period</strong> commences for the purchaser on acquisition.</p><div class="callout info"><strong>VAT recovery on sale costs</strong><br/>Where TOB relief applies, VAT on sale-related costs is treated as a general overhead of the letting business. Recovery is permissible where the underlying letting is <strong>taxable</strong>.</div><div class="callout warn">⚠️ <strong>Consider s64(6)(b)</strong> — where VAT was restricted on acquisition/development and an uplift in recovery arises due to the underlying taxable sale.</div>` },
        tob_exempt: { tag: "TOB Relief — Underlying Exempt", tagColor: "var(--pwc-orange)", tagBackground: "var(--pwc-orange-soft)", legislationRefs: ["s20_2c", "s94_2"], html: `<p>In accordance with <strong>Section 20(2)(c) VATCA 2010</strong>, VAT Transfer of Business ("TOB") relief applies. The transfer is <strong>not a supply for VAT purposes</strong>.</p><p><strong>Capital Goods Scheme implications:</strong></p><p>Where the sale would be <strong>exempt in the absence of TOB relief</strong>, the purchaser <strong>"steps into the shoes"</strong> of the vendor and <strong>inherits the vendor's CGS obligations</strong>.</p><div class="callout warn">⚠️ The vendor <strong>must provide the purchaser with a CGS record</strong> in respect of the property. The purchaser continues the vendor's CGS adjustment period.</div><div class="callout info"><strong>VAT recovery on sale costs</strong><br/>Recovery depends on whether the underlying letting is taxable or exempt. Where subject to a <strong>legacy lease</strong>, Revenue's view is that VAT on sale costs is <strong>not deductible</strong>.</div>` },
        no_tob_taxable: { tag: "VAT @ 13.5%", tagColor: "var(--pwc-orange)", tagBackground: "var(--pwc-orange-soft)", legislationRefs: ["s94_2"], html: `<p>The property was completed within the last 5 years and TOB relief does not apply. The sale is <strong>subject to VAT at 13.5%</strong>.</p><div class="callout warn">⚠️ Consider whether <strong>s94(2)(c)</strong> applies — the 24-month occupation rule for second/subsequent supplies.</div><div class="callout info"><strong>Practical steps</strong><br/>• VAT invoice on completion (or by 15th of following month)<br/>• VAT in Vendor's return (Box T1)<br/>• Vendor entitled to VAT recovery on sale costs<br/>• PCVEs required<br/>• VAT charging clause in Contract for Sale</div>` },
        no_tob_exempt_jott: { tag: "Exempt → JOTT → 13.5%", tagColor: "#7c3aed", tagBackground: "#f5f3ff", legislationRefs: ["s94_2", "s94_5", "s94_6"], html: `<p>The property was completed more than 5 years ago and TOB relief does not apply. The sale is <strong>exempt in the first instance</strong>.</p><p>The <strong>JOTT</strong> renders the supply taxable. The purchaser self-accounts at <strong>13.5%</strong> under the reverse charge mechanism.</p><ul><li>Prevents CGS clawback for the vendor</li><li>Permits VAT recovery on sale costs</li></ul><div class="callout info"><strong>Practical steps</strong><br/>• Written agreement by 15th of month following supply<br/>• PCVEs required (Purchaser completes page 3)<br/>• VAT clause in Contract for Sale<br/>• Purchaser self-accounts under reverse charge</div>` },
        no_tob_exempt_no_jott: { tag: "Exempt — No JOTT", tagColor: "var(--color-success)", tagBackground: "var(--color-success-soft)", legislationRefs: ["s94_2", "s94_5"], html: `<p>The property was completed more than 5 years ago, TOB relief does not apply, and the JOTT will not be exercised. The sale is <strong>exempt from VAT</strong>.</p><div class="callout warn">⚠️ A <strong>CGS clawback</strong> may arise if the vendor previously recovered VAT on acquisition/development within the adjustment period.</div><div class="callout info"><strong>Practical steps</strong><br/>• PCVEs required<br/>• No VAT clause (include "the transfer is not subject to VAT")<br/>• Vendor <strong>cannot</strong> recover VAT on sale costs</div>` },

      function getRctFlow(answers) {
        const flow = ["rct1"];
        if (answers.rct1 === undefined) return flow;

        // Not a principal contractor — RCT does not apply
        if (answers.rct1 === "No") return flow;

        flow.push("rct2");
        if (answers.rct2 === undefined) return flow;

        // Not a relevant contract — RCT does not apply
        if (answers.rct2 === "No") return flow;

        flow.push("rct3");
        if (answers.rct3 === undefined) return flow;

        // Not relevant operations — RCT does not apply
        if (answers.rct3 === "No") return flow;

        // All 3 conditions met — RCT applies. Now determine rate.
        flow.push("rct4");
        if (answers.rct4 === undefined) return flow;

        // If zero rate selected, confirm s530G conditions
        if (answers.rct4 === "zeroRate") {
          flow.push("rct5_zero_confirm");
          if (answers.rct5_zero_confirm === undefined) return flow;
          // After confirming, check partnership
          flow.push("rct6_partnership");
          return flow;
        }

        // For 20% and 35%, check partnership
        flow.push("rct6_partnership");
        return flow;
      }

      function getRctOutcome(answers) {
        // Early exits — RCT does not apply
        if (answers.rct1 === "No") return "not_principal";
        if (answers.rct1 === "Yes" && answers.rct2 === "No") return "not_relevant_contract";
        if (answers.rct1 === "Yes" && answers.rct2 === "Yes" && answers.rct3 === "No") return "not_relevant_ops";

        // RCT applies — determine rate
        if (answers.rct1 === "Yes" && answers.rct2 === "Yes" && answers.rct3 === "Yes") {
          // Zero rate path
          if (answers.rct4 === "zeroRate") {
            if (answers.rct5_zero_confirm === "Yes" && answers.rct6_partnership !== undefined) {
              return answers.rct6_partnership === "Yes" ? "rct_zero_partnership" : "rct_zero";
            }
            if (answers.rct5_zero_confirm === "No" && answers.rct6_partnership !== undefined) {
              return answers.rct6_partnership === "Yes" ? "rct_twenty_partnership" : "rct_twenty_downgraded";
            }
            return null;
          }
          // 20% rate path
          if (answers.rct4 === "standardRate" && answers.rct6_partnership !== undefined) {
            return answers.rct6_partnership === "Yes" ? "rct_twenty_partnership" : "rct_twenty";

            return answers.rct6_partnership === "Yes" ? "rct_thirtyfive_partnership" : "rct_thirtyfive";
          }
        }

        return null;
