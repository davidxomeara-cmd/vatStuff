                </div>
                <div style={{ width: 1, height: 24, background: "var(--grey-200)" }} />
                <div style={{ fontSize: "0.72rem", fontWeight: 600, color: "var(--grey-500)", letterSpacing: ".2px" }}>Tax Technology &amp; Transformation</div>
              </div>
              <div style={{ width: 1, height: 28, background: "var(--grey-200)", margin: "0 4px" }} />
              <button onClick={() => navigate("/")} style={{ background: "none", border: "none", color: "var(--grey-500)", fontSize: "0.78rem", fontWeight: 500, cursor: "pointer", transition: "color .2s", fontFamily: "inherit" }} onMouseOver={(e) => (e.target.style.color = "var(--pwc-orange)")} onMouseOut={(e) => (e.target.style.color = "var(--grey-500)")}>Tax Tools</button>
              {!isHomePage && currentTool && (
                <>
                  <span style={{ fontSize: "0.72rem", color: "var(--grey-300)", margin: "0 2px" }}></span>
                  <span style={{ fontSize: "0.78rem", fontWeight: 600, color: "var(--grey-700)" }}>{currentTool.title}</span>
                </>
              )}
              {!isHomePage && (
                <button onClick={() => navigate("/")} aria-label="Back to all tools" style={{ marginLeft: "auto", padding: "7px 18px", background: "var(--grey-50)", border: "1.5px solid var(--grey-200)", borderRadius: 10, fontSize: "0.74rem", fontWeight: 600, color: "var(--grey-500)", cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 6, transition: "all .25s", fontFamily: "inherit" }} onMouseOver={(e) => { e.currentTarget.style.borderColor = "var(--pwc-orange)"; e.currentTarget.style.color = "var(--pwc-orange)"; e.currentTarget.style.background = "var(--pwc-orange-soft)"; }} onMouseOut={(e) => { e.currentTarget.style.borderColor = "var(--grey-200)"; e.currentTarget.style.color = "var(--grey-500)"; e.currentTarget.style.background = "var(--grey-50)"; }}>← All Tools</button>
              )}
            </div>
          </nav>
        );
      }

      function PageHero({ badge, title, description }) {
        return (
          <header style={{ background: "#ffe8d4", padding: "44px 44px 40px", borderRadius: 22, marginBottom: 28, position: "relative", overflow: "hidden", boxShadow: "0 8px 32px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08)" }}>
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 4, background: "linear-gradient(90deg, var(--pwc-orange), var(--pwc-orange-light), var(--pwc-orange))" }} />
            <div style={{ position: "absolute", bottom: 0, left: 0, width: "35%", height: 3, background: "var(--pwc-orange)", opacity: 0.5 }} />
            <div style={{ position: "relative" }}>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 14px", background: "rgba(208,74,2,0.15)", borderRadius: 8, marginBottom: 18, fontSize: "0.72rem", fontWeight: 600, color: "var(--pwc-orange-light)", textTransform: "uppercase", letterSpacing: 0.8, border: "1px solid rgba(208,74,2,0.2)" }}>{badge}</div>
              <h1 style={{ fontSize: "1.9rem", fontWeight: 800, color: "black", marginBottom: 12, lineHeight: 1.25, letterSpacing: "-0.03em", maxWidth: 560 }}>{title}</h1>
              <p style={{ color: "black", fontSize: "0.9rem", maxWidth: 540, lineHeight: 1.7, fontWeight: 400 }}>{description}</p>
            </div>
          </header>
        );
      }

      function ProgressBar({ answeredCount, totalCount, isComplete, onRestart }) {
        const percentage = isComplete ? 100 : (answeredCount / Math.max(totalCount, 1)) * 85;
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 26, padding: "0 4px" }} role="progressbar" aria-valuenow={answeredCount} aria-valuemin={0} aria-valuemax={totalCount}>
            {answeredCount > 0 && (
              <button onClick={onRestart} aria-label="Restart flow" style={{ background: "none", border: "1.5px solid var(--grey-200)", borderRadius: 8, padding: "5px 14px", fontSize: "0.72rem", fontWeight: 600, color: "var(--grey-500)", cursor: "pointer", whiteSpace: "nowrap", fontFamily: "inherit", transition: "all .25s", display: "inline-flex", alignItems: "center", gap: 5 }} onMouseOver={(e) => { e.currentTarget.style.borderColor = "var(--pwc-orange)"; e.currentTarget.style.color = "var(--pwc-orange)"; e.currentTarget.style.background = "var(--pwc-orange-soft)"; }} onMouseOut={(e) => { e.currentTarget.style.borderColor = "var(--grey-200)"; e.currentTarget.style.color = "var(--grey-500)"; e.currentTarget.style.background = "none"; }}>↺ Restart</button>
            )}
            <span style={{ fontSize: "0.7rem", fontWeight: 600, color: "var(--grey-400)", textTransform: "uppercase", letterSpacing: 0.8, whiteSpace: "nowrap" }}>Progress</span>
            <div style={{ background: "var(--grey-200)", borderRadius: "var(--radius-full)", height: 5, flex: 1, overflow: "hidden", position: "relative" }}>
              <div style={{ background: isComplete ? "linear-gradient(90deg, var(--color-success), #22c55e)" : "linear-gradient(90deg, var(--pwc-orange), var(--pwc-orange-light))", height: "100%", borderRadius: "var(--radius-full)", transition: "width .6s var(--ease-out-expo)", width: `${percentage}%`, position: "relative" }}>
                {!isComplete && percentage > 5 && (<div style={{ position: "absolute", right: 0, top: -1, width: 8, height: 8, borderRadius: "var(--radius-full)", background: "white", border: "2px solid var(--pwc-orange)", boxShadow: "0 0 8px rgba(208,74,2,0.3)" }} />)}
              </div>
            </div>
            <span style={{ fontSize: "0.72rem", fontWeight: 600, color: isComplete ? "var(--color-success)" : "var(--grey-400)", whiteSpace: "nowrap" }}>{isComplete ? "✓ Complete" : `${answeredCount} of ~${totalCount}`}</span>
          </div>
        );
      }

      function Footer() {
        return (
          <footer style={{ marginTop: 40, padding: "18px 24px", background: "white", border: "1px solid var(--grey-200)", borderRadius: 14, fontSize: "0.75rem", color: "var(--grey-400)", textAlign: "center", lineHeight: 1.65 }}>
            This tool is for informational purposes only and does not constitute tax advice. Based on TCA 1997, VATCA 2010 and Finance Act 2025. © {new Date().getFullYear()} PricewaterhouseCoopers. All rights reserved.
          </footer>
        );
      }

      function GlossaryTerm({ termKey }) {
        const [isOpen, setIsOpen] = useState(false);
        const glossaryEntry = GLOSSARY_DATABASE[termKey];
        if (!glossaryEntry) return <span>{termKey}</span>;
        return (
          <span className="glossary-tooltip" onMouseEnter={() => setIsOpen(true)} onMouseLeave={() => setIsOpen(false)} onClick={() => setIsOpen((prev) => !prev)}>
            <span className="glossary-term" role="button" tabIndex={0} aria-label={`Define: ${glossaryEntry.term}`}>"{glossaryEntry.term}"</span>
            {isOpen && (
              <div className="glossary-tooltip__popup" role="tooltip">
                <div style={{ fontWeight: 700, marginBottom: 6, fontSize: "0.82rem" }}>{glossaryEntry.term}</div>
                <div style={{ opacity: 0.6, fontSize: "0.7rem", marginBottom: 8 }}>{glossaryEntry.source}</div>
                <div style={{ lineHeight: 1.75 }}>{glossaryEntry.definition}</div>
              </div>
            )}
          </span>
        );
      }

      function LegislationLink({ legislationKey, isOpen, onToggle }) {
        const entry = LEGISLATION_DATABASE[legislationKey];
        if (!entry) return null;
        return (
          <button onClick={onToggle} aria-expanded={isOpen} style={{ background: isOpen ? "var(--pwc-orange-dark)" : "var(--grey-50)", border: `1px solid ${isOpen ? "var(--pwc-dark)" : "var(--grey-200)"}`, color: isOpen ? "white" : "var(--grey-600)", padding: "6px 14px", borderRadius: 10, fontSize: "0.74rem", fontWeight: 600, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 6, marginBottom: 10, transition: "all .25s", fontFamily: "inherit" }}>
            📖 {isOpen ? "Hide" : "View"} s{entry.section} TCA/VATCA
          </button>
        );
      }

      function LegislationPanel({ legislationKey, onClose }) {
        const entry = LEGISLATION_DATABASE[legislationKey];
        if (!entry) return null;
        return (
          <div className="legislation-panel anim-fade-up" style={{ marginTop: 14 }}>
            <div className="legislation-panel__header">
              <span>📖 {entry.title}</span>
              <button onClick={onClose} aria-label="Close legislation panel" style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "white", width: 28, height: 28, borderRadius: 8, cursor: "pointer", fontSize: "0.8rem", display: "flex", alignItems: "center", justifyContent: "center", transition: "background .2s" }} onMouseOver={(e) => (e.target.style.background = "rgba(255,255,255,0.2)")} onMouseOut={(e) => (e.target.style.background = "rgba(255,255,255,0.1)")}>✕</button>
            </div>
            <div className="legislation-panel__body" dangerouslySetInnerHTML={{ __html: entry.text }} />
          </div>
        );
      }

      function InfoExpander({ preview, detail }) {
        const [isExpanded, setIsExpanded] = useState(false);
        if (!detail) return null;
        return (
          <div style={{ marginBottom: 10 }}>
            {preview && (<div style={{ fontSize: "0.78rem", color: "var(--grey-500)", lineHeight: 1.6, marginBottom: 6, fontStyle: "italic" }}>{preview}</div>)}
            <button onClick={() => setIsExpanded(!isExpanded)} aria-expanded={isExpanded} style={{ background: "none", border: "none", color: "var(--pwc-orange)", fontSize: "0.78rem", cursor: "pointer", padding: "2px 0", display: "flex", alignItems: "center", gap: 5, fontWeight: 500, marginBottom: 8, opacity: 0.85, transition: "all .2s", fontFamily: "inherit" }} onMouseOver={(e) => (e.target.style.opacity = 1)} onMouseOut={(e) => (e.target.style.opacity = 0.85)}>
              <span style={{ display: "inline-block", transition: "transform .25s var(--ease-out-expo)", transform: isExpanded ? "rotate(90deg)" : "rotate(0)", fontSize: "0.7rem" }}>▶</span>
              {isExpanded ? "Hide detail" : "Read more"}
            </button>
            {isExpanded && (<div className="anim-fade-up" style={{ background: "var(--pwc-warm-grey)", borderRadius: "var(--radius-md)", padding: "16px 18px", marginBottom: 12, fontSize: "0.8rem", color: "var(--grey-600)", border: "1px solid var(--grey-200)", lineHeight: 1.8 }} dangerouslySetInnerHTML={{ __html: detail }} />)}
          </div>
        );
      }

      function QuestionNumberBadge({ number, isAnswered, isYes, isActive }) {
        const getBackground = () => {
          if (isAnswered) return isYes ? "var(--color-success)" : "var(--color-danger)";
          if (isActive) return "var(--pwc-orange)";
          return "var(--grey-300)";
        };
        return (
          <div aria-hidden="true" style={{ width: 34, height: 34, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: isAnswered ? "1rem" : "0.78rem", fontWeight: 700, flexShrink: 0, color: "white", background: getBackground(), transition: "all .35s var(--ease-out-expo)", animation: isAnswered ? "checkMark .4s var(--ease-out-expo)" : "none", boxShadow: isActive && !isAnswered ? "0 2px 12px rgba(208,74,2,0.25)" : "none" }}>
            {isAnswered ? (isYes ? "✓" : "✗") : number}
          </div>
        );
      }

      function YesNoButtons({ currentValue, yesLabel, noLabel, onSelectYes, onSelectNo }) {
        const isYes = currentValue === "Yes";
        const isNo = currentValue === "No";
        const baseStyle = { padding: "13px 18px", borderRadius: 12, border: "1.5px solid", fontSize: "0.84rem", fontWeight: 500, cursor: "pointer", flex: 1, textAlign: "center", fontFamily: "inherit", transition: "all .3s var(--ease-out-expo)", position: "relative", overflow: "hidden" };
        return (
          <div style={{ display: "flex", gap: 10 }} role="radiogroup">
            <button role="radio" aria-checked={isYes} onClick={onSelectYes} style={{ ...baseStyle, background: isYes ? "var(--color-success-soft)" : "white", borderColor: isYes ? "var(--color-success)" : "var(--grey-200)", color: isYes ? "var(--color-success)" : "var(--grey-600)", boxShadow: isYes ? "0 4px 16px rgba(22,163,74,0.12)" : "0 1px 3px rgba(0,0,0,0.04)", transform: isYes ? "scale(1.02)" : "scale(1)" }} onMouseOver={(e) => { if (!isYes) { e.currentTarget.style.borderColor = "var(--color-success)"; e.currentTarget.style.background = "#fafff7"; } }} onMouseOut={(e) => { if (!isYes) { e.currentTarget.style.borderColor = "var(--grey-200)"; e.currentTarget.style.background = "white"; } }}>✓ {yesLabel}</button>
            <button role="radio" aria-checked={isNo} onClick={onSelectNo} style={{ ...baseStyle, background: isNo ? "var(--color-danger-soft)" : "white", borderColor: isNo ? "var(--color-danger)" : "var(--grey-200)", color: isNo ? "#b91c1c" : "var(--grey-600)", boxShadow: isNo ? "0 4px 16px rgba(220,38,38,0.1)" : "0 1px 3px rgba(0,0,0,0.04)", transform: isNo ? "scale(1.02)" : "scale(1)" }} onMouseOver={(e) => { if (!isNo) { e.currentTarget.style.borderColor = "var(--color-danger)"; e.currentTarget.style.background = "#fff8f8"; } }} onMouseOut={(e) => { if (!isNo) { e.currentTarget.style.borderColor = "var(--grey-200)"; e.currentTarget.style.background = "white"; } }}>✗ {noLabel}</button>
          </div>
        );
      }

      function ChoiceButtons({ choices, currentValue, onSelect }) {
        return (
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }} role="radiogroup">
            {choices.map((choice) => {
              const isSelected = currentValue === choice.value;
              return (
                <button key={choice.value} role="radio" aria-checked={isSelected} onClick={() => onSelect(choice.value)} style={{ padding: "13px 18px", borderRadius: 12, border: "1.5px solid", fontSize: "0.84rem", fontWeight: 500, cursor: "pointer", flex: 1, minWidth: 160, textAlign: "left", fontFamily: "inherit", transition: "all .3s var(--ease-out-expo)", background: isSelected ? "var(--pwc-orange-soft)" : "white", borderColor: isSelected ? "var(--pwc-orange)" : "var(--grey-200)", color: isSelected ? "var(--pwc-orange-dark)" : "var(--grey-600)", boxShadow: isSelected ? "0 4px 16px rgba(208,74,2,0.1)" : "0 1px 3px rgba(0,0,0,0.04)", display: "flex", alignItems: "center", gap: 10, transform: isSelected ? "scale(1.02)" : "scale(1)" }} onMouseOver={(e) => { if (!isSelected) { e.currentTarget.style.borderColor = "var(--pwc-orange)"; e.currentTarget.style.background = "var(--pwc-orange-softer)"; } }} onMouseOut={(e) => { if (!isSelected) { e.currentTarget.style.borderColor = "var(--grey-200)"; e.currentTarget.style.background = "white"; } }}>
                  <span style={{ fontSize: "1.1rem" }}>{choice.icon}</span>
                  {choice.label}
                </button>
              );
            })}
          </div>
        );
      }

      function QuestionCard({ questionId, displayNumber, questionConfig, currentAnswer, isActive, isAnswered, onAnswer, onEdit }) {
        const [openLegislationKey, setOpenLegislationKey] = useState(null);
        const isYesAnswer = questionConfig.type === "choice" ? questionConfig.choices[0] && currentAnswer === questionConfig.choices[0].value : currentAnswer === "Yes";
        const getBorderColor = () => { if (isActive && !isAnswered) return "var(--pwc-orange)"; if (isAnswered && isYesAnswer) return "var(--color-success-muted)"; if (isAnswered) return "var(--color-danger-border)"; return "transparent"; };
        const getLeftBorderColor = () => { if (isActive && !isAnswered) return "var(--pwc-orange)"; if (isAnswered && isYesAnswer) return "var(--color-success)"; if (isAnswered) return "var(--color-danger)"; return "var(--grey-200)"; };
        let cardClass = "question-card";
        if (isActive && !isAnswered) cardClass += " is-active";
        if (!isActive && !isAnswered) cardClass += " is-inactive";
        return (
          <div className={cardClass} style={{ border: `1.5px solid ${getBorderColor()}`, borderLeft: `4px solid ${getLeftBorderColor()}` }}>
            <div style={{ padding: "18px 22px", display: "flex", alignItems: "flex-start", gap: 14 }}>
              <QuestionNumberBadge number={displayNumber} isAnswered={isAnswered} isYes={isYesAnswer} isActive={isActive} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: "0.92rem", fontWeight: 600, color: "var(--pwc-black)", lineHeight: 1.5, letterSpacing: "-0.01em" }}>{questionConfig.title}</div>
                {questionConfig.actionableHint && (isActive || isAnswered) && (<div style={{ fontSize: "0.78rem", color: "var(--grey-500)", marginTop: 4, lineHeight: 1.55, fontStyle: "italic" }}>💡 {questionConfig.actionableHint}</div>)}
                {questionConfig.glossaryTerms && questionConfig.glossaryTerms.length > 0 && (isActive || isAnswered) && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
                    {questionConfig.glossaryTerms.map((termKey) => (<span key={termKey} style={{ display: "inline-flex" }}><GlossaryTerm termKey={termKey} /></span>))}
                  </div>
                )}
              </div>
            </div>
            {(isActive || isAnswered) && (
              <div style={{ padding: "0 22px 20px", paddingLeft: 70 }}>
                <InfoExpander preview={questionConfig.infoPreview} detail={questionConfig.infoDetail} />
                {questionConfig.legislationRef && (
                  <>
                    <LegislationLink legislationKey={questionConfig.legislationRef} isOpen={openLegislationKey === questionConfig.legislationRef} onToggle={() => setOpenLegislationKey(openLegislationKey === questionConfig.legislationRef ? null : questionConfig.legislationRef)} />
                    {openLegislationKey === questionConfig.legislationRef && (<LegislationPanel legislationKey={questionConfig.legislationRef} onClose={() => setOpenLegislationKey(null)} />)}
                  </>
                )}
                <div style={{ marginTop: openLegislationKey ? 14 : 4 }}>
                  {questionConfig.type === "choice" ? (
                    <ChoiceButtons choices={questionConfig.choices} currentValue={currentAnswer} onSelect={(value) => onAnswer(questionId, value)} />
                  ) : (
                    <YesNoButtons currentValue={currentAnswer} yesLabel={questionConfig.yesLabel} noLabel={questionConfig.noLabel} onSelectYes={() => onAnswer(questionId, "Yes")} onSelectNo={() => onAnswer(questionId, "No")} />
                  )}
                </div>
              </div>
            )}
          </div>
        );
      }

      function DecisionPath({ flow, answersState, questionsConfig, trailLabels }) {
        const answeredSteps = flow.filter((qId) => answersState[qId] !== undefined);
        if (answeredSteps.length === 0) return null;
        return (
          <div className="decision-path" role="navigation" aria-label="Decision path">
            {answeredSteps.map((questionId, index) => {
              const answer = answersState[questionId];
              const question = questionsConfig[questionId];
              const label = trailLabels[questionId] || questionId;
              const isYes = question.type === "choice" ? question.choices[0] && answer === question.choices[0].value : answer === "Yes";
              const displayValue = question.type === "choice" ? question.choices.find((c) => c.value === answer)?.shortLabel || answer : answer;
              return (
                <Fragment key={questionId}>
                  {index > 0 && <span className="decision-path__arrow">→</span>}
                  <span className="decision-path__step">{label}: <span className={`decision-path__value ${isYes ? "is-yes" : "is-no"}`}>{displayValue}</span></span>
                </Fragment>
              );
            })}
          </div>
        );
      }

      function AnswerPanel({ answersState, questionFlow, questionsConfig, getOutcomeFn, outcomesDatabase, trailLabels, toolTitle, onCopyLink, onExportPdf }) {
        const outcomeKey = getOutcomeFn(answersState);
        const outcomeData = outcomeKey ? outcomesDatabase[outcomeKey] : null;
        const [animationKey, setAnimationKey] = useState(0);
        const [openLegislationKey, setOpenLegislationKey] = useState(null);
        const previousOutcome = useRef(null);
        useEffect(() => { if (outcomeKey !== previousOutcome.current) { setAnimationKey((k) => k + 1); setOpenLegislationKey(null); previousOutcome.current = outcomeKey; } }, [outcomeKey]);
        const hasAnyAnswer = Object.keys(answersState).length > 0;
        return (
          <div className="answer-panel" style={{ position: "sticky", top: 24, borderRadius: 20, overflow: "hidden", background: "white", boxShadow: "0 1px 4px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06)", border: "1px solid var(--grey-200)", maxHeight: "calc(100vh - 48px)", display: "flex", flexDirection: "column", transition: "box-shadow .3s" }}>
            <div style={{ background: "#ffe8d4", padding: "18px 24px", display: "flex", alignItems: "center", gap: 12, flexShrink: 0, position: "relative", overflow: "hidden" }}>
              <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: "linear-gradient(90deg, var(--pwc-orange), var(--pwc-orange-light), var(--pwc-orange))" }} />
              <div style={{ width: 36, height: 36, borderRadius: 10, background: "rgba(208,74,2,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1rem", border: "1px solid rgba(208,74,2,0.3)" }}>📋</div>
              <div>
                <div style={{ color: "black", fontSize: "0.95rem", fontWeight: 700, letterSpacing: "-0.01em" }}>Analysis</div>
                <div style={{ color: "black", fontSize: "0.72rem", fontWeight: 500, marginTop: 1 }}>{outcomeData ? "Outcome determined" : hasAnyAnswer ? "In progress…" : "Awaiting your input"}</div>
              </div>
              {outcomeData && (<div style={{ marginLeft: "auto", width: 10, height: 10, borderRadius: "var(--radius-full)", background: "var(--color-success)", boxShadow: "0 0 8px rgba(22,163,74,0.5)" }} />)}
            </div>
            <div style={{ padding: 22, overflowY: "auto", flex: 1 }}>
              {hasAnyAnswer && (<DecisionPath flow={questionFlow} answersState={answersState} questionsConfig={questionsConfig} trailLabels={trailLabels} />)}
              {!outcomeData && !hasAnyAnswer && (
                <div style={{ textAlign: "center", padding: "36px 16px" }}>
                  <div style={{ width: 72, height: 72, borderRadius: 20, margin: "0 auto 20px", background: "var(--pwc-warm-grey)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.8rem", animation: "float 4s ease-in-out infinite" }}>🔍</div>
                  <p style={{ fontSize: "0.95rem", fontWeight: 600, color: "var(--grey-700)", marginBottom: 8 }}>No data yet</p>
                  <p style={{ fontSize: "0.84rem", color: "var(--grey-400)", lineHeight: 1.7, maxWidth: 280, margin: "0 auto" }}>Answer the questions on the left and the analysis will build here in real time.</p>
                  <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 24 }}>{[0, 1, 2].map((i) => (<div key={i} style={{ width: 6, height: 6, borderRadius: "var(--radius-full)", background: "var(--pwc-orange)", opacity: 0.2, animation: `dotPulse 1.4s ${i * 0.16}s ease-in-out infinite` }} />))}</div>
                </div>
              )}
              {!outcomeData && hasAnyAnswer && (
                <div style={{ textAlign: "center", padding: "32px 16px" }}>
                  <div style={{ width: 48, height: 3, borderRadius: "var(--radius-full)", margin: "0 auto 24px", background: "linear-gradient(90deg, transparent, var(--pwc-orange), transparent)", backgroundSize: "200% 100%", animation: "shimmer 2.4s ease-in-out infinite", opacity: 0.5 }} />
                  <p style={{ fontSize: "0.88rem", fontWeight: 600, color: "var(--grey-600)", marginBottom: 8, letterSpacing: "-0.01em" }}>Analysis in progress</p>
                  <p style={{ fontSize: "0.8rem", color: "var(--grey-400)", lineHeight: 1.7, maxWidth: 260, margin: "0 auto" }}>Continue answering to determine the outcome.</p>
                  <div style={{ width: 32, height: 1, borderRadius: "var(--radius-full)", margin: "28px auto 0", background: "var(--grey-300)", animation: "pulseWidth 3s ease-in-out infinite", opacity: 0.4 }} />
                </div>
              )}
              {outcomeData && (
                <div key={animationKey} style={{ animation: "completePop .4s var(--ease-out-expo) forwards" }}>
                  <span style={{ display: "inline-block", padding: "6px 16px", borderRadius: 10, fontSize: "0.76rem", fontWeight: 700, marginBottom: 18, textTransform: "uppercase", letterSpacing: 0.3, background: outcomeData.tagBackground, color: outcomeData.tagColor, border: `1px solid ${outcomeData.tagColor}22` }}>{outcomeData.tag}</span>
                  <div className="answer-content" dangerouslySetInnerHTML={{ __html: outcomeData.html }} />
                  {outcomeData.isCatchAll && (<div className="callout info" style={{ marginTop: 20 }}><strong>Need help?</strong> Your scenario may require bespoke advice. Contact your PwC engagement team for tailored guidance.</div>)}
                  {outcomeData.legislationRefs && outcomeData.legislationRefs.length > 0 && (
                    <div style={{ marginTop: 20, paddingTop: 18, borderTop: "1px solid var(--grey-200)" }}>
                      <div style={{ fontSize: "0.72rem", fontWeight: 600, color: "var(--grey-500)", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 10 }}>Relevant Legislation</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>{outcomeData.legislationRefs.map((ref) => (<Fragment key={ref}><LegislationLink legislationKey={ref} isOpen={openLegislationKey === ref} onToggle={() => setOpenLegislationKey(openLegislationKey === ref ? null : ref)} /></Fragment>))}</div>
                      {openLegislationKey && (<LegislationPanel legislationKey={openLegislationKey} onClose={() => setOpenLegislationKey(null)} />)}
                    </div>
                  )}
                  <div style={{ marginTop: 24, paddingTop: 18, borderTop: "1px solid var(--grey-200)", display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <button onClick={onCopyLink} style={{ padding: "10px 20px", borderRadius: 10, border: "1.5px solid var(--grey-200)", background: "white", color: "var(--grey-600)", fontSize: "0.78rem", fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, transition: "all .25s", fontFamily: "inherit", flex: 1, justifyContent: "center" }} onMouseOver={(e) => { e.currentTarget.style.borderColor = "var(--pwc-orange)"; e.currentTarget.style.color = "var(--pwc-orange)"; }} onMouseOut={(e) => { e.currentTarget.style.borderColor = "var(--grey-200)"; e.currentTarget.style.color = "var(--grey-600)"; }}>🔗 Copy Link</button>
                    <button onClick={onExportPdf} style={{ padding: "10px 20px", borderRadius: 10, border: "1.5px solid var(--pwc-orange)", background: "var(--pwc-orange-soft)", color: "var(--pwc-orange)", fontSize: "0.78rem", fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, transition: "all .25s", fontFamily: "inherit", flex: 1, justifyContent: "center" }} onMouseOver={(e) => { e.currentTarget.style.background = "var(--pwc-orange)"; e.currentTarget.style.color = "white"; }} onMouseOut={(e) => { e.currentTarget.style.background = "var(--pwc-orange-soft)"; e.currentTarget.style.color = "var(--pwc-orange)"; }}>📄 Export PDF</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      function MobileBottomSheet({ isOpen, onClose, children, answeredCount, totalCount, isComplete }) {
        return (
          <>
            <div className="mobile-summary-bar" onClick={onClose} role="button" tabIndex={0} aria-label="Open analysis panel">
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: "1rem" }}>📋</span>
                <div>
                  <div style={{ fontSize: "0.82rem", fontWeight: 600, color: "var(--pwc-black)" }}>{isComplete ? "Analysis Complete" : "Analysis"}</div>
                  <div style={{ fontSize: "0.72rem", color: "var(--grey-400)" }}>{isComplete ? "Tap to view outcome" : `${answeredCount} of ~${totalCount} answered`}</div>
                </div>
              </div>
              <span style={{ fontSize: "0.78rem", fontWeight: 600, color: "var(--pwc-orange)", padding: "6px 14px", background: "var(--pwc-orange-soft)", borderRadius: 8 }}>View ↑</span>
            </div>
            <div className={`mobile-sheet-overlay ${isOpen ? "is-open" : ""}`} onClick={onClose} />
            <div className={`mobile-sheet ${isOpen ? "is-open" : ""}`}>
              <div className="mobile-sheet__handle" />
              <div style={{ padding: "0 20px 20px" }}>{children}</div>
            </div>
          </>
        );
      }

      function StartOverButton({ onClick }) {
        return (
          <div style={{ textAlign: "center", marginTop: 20 }} className="no-print">
            <button onClick={onClick} style={{ padding: "10px 28px", background: "white", color: "var(--grey-500)", border: "1.5px solid var(--grey-200)", borderRadius: 12, fontSize: "0.82rem", fontWeight: 600, cursor: "pointer", transition: "all .25s", fontFamily: "inherit" }} onMouseOver={(e) => { e.currentTarget.style.borderColor = "var(--pwc-orange)"; e.currentTarget.style.color = "var(--pwc-orange)"; e.currentTarget.style.background = "var(--pwc-orange-soft)"; }} onMouseOut={(e) => { e.currentTarget.style.borderColor = "var(--grey-200)"; e.currentTarget.style.color = "var(--grey-500)"; e.currentTarget.style.background = "white"; }}>↻ Start Over</button>
          </div>
        );
      }

      /* ================================================================
   ================================================================

   SECTION D — PAGE COMPONENTS

   ================================================================
   ================================================================ */

      function HomePage({ navigate }) {
        return (
          <main style={{ maxWidth: "var(--max-width)", margin: "0 auto", padding: "28px 24px 80px" }}>
            <header style={{ background: "#ffe8d4", padding: "56px 52px 52px", borderRadius: 22, marginBottom: 36, position: "relative", overflow: "hidden", boxShadow: "0 8px 32px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08)" }}>
              <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 4, background: "linear-gradient(90deg, var(--pwc-orange), var(--pwc-orange-light), var(--pwc-orange))" }} />
              <div style={{ position: "absolute", bottom: 0, left: 0, width: "40%", height: 3, background: "var(--pwc-orange)", opacity: 0.4 }} />
              <div style={{ position: "relative" }}>
                <div style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 14px", background: "rgba(208,74,2,0.15)", borderRadius: 8, marginBottom: 22, fontSize: "0.72rem", fontWeight: 600, color: "var(--pwc-orange-light)", textTransform: "uppercase", letterSpacing: 0.8, border: "1px solid rgba(208,74,2,0.2)" }}>🏠 Tax · Tool Suite</div>
                <h1 style={{ fontSize: "2.4rem", fontWeight: 900, color: "black", marginBottom: 14, lineHeight: 1.15, letterSpacing: "-0.04em", maxWidth: 600 }}>Tax Decision Tools</h1>
                <p style={{ color: "black", fontSize: "0.94rem", maxWidth: 560, lineHeight: 1.75, fontWeight: 400 }}>Interactive decision tools for Irish tax on property transactions, withholding tax, and more. Select a tool below to get started.</p>
              </div>
            </header>
            <div style={{ marginBottom: 16, padding: "0 4px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <h2 style={{ fontSize: "1.05rem", fontWeight: 700, color: "var(--pwc-black)", letterSpacing: "-0.02em" }}>Tools</h2>
              <span style={{ fontSize: "0.72rem", fontWeight: 500, color: "var(--grey-400)", textTransform: "uppercase", letterSpacing: 0.6 }}>TCA 1997 · VATCA 2010 · Finance Act 2025</span>
            </div>
            <div className="home-grid" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 }}>
              {TOOL_REGISTRY.map((tool, index) => {
                const isLive = !!tool.route;
                return (
                  <div key={tool.id} className={`tool-tile ${!isLive ? "is-disabled" : ""}`} style={{ animation: `staggerIn .5s var(--ease-out-expo) ${index * 0.08}s both` }} onClick={() => isLive && navigate(tool.route)} role="button" tabIndex={isLive ? 0 : -1} aria-label={`Open ${tool.title} tool`} onKeyDown={(e) => e.key === "Enter" && isLive && navigate(tool.route)}>
                    <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between" }}>
                      <div className="tool-tile__icon" style={{ background: tool.iconBackground }}>{tool.icon}</div>
                      <span style={{ fontSize: "0.64rem", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.6, padding: "3px 10px", borderRadius: 6, background: isLive ? "var(--color-success-soft)" : "var(--grey-50)", color: tool.tagColor, border: `1px solid ${isLive ? "var(--color-success-muted)" : "var(--grey-200)"}` }}>{tool.tag}</span>
                    </div>
                    <div>
                      <div style={{ fontSize: "0.95rem", fontWeight: 700, color: "var(--pwc-black)", letterSpacing: "-0.01em", lineHeight: 1.3 }}>{tool.title}</div>
                      <div style={{ fontSize: "0.72rem", fontWeight: 600, color: "var(--pwc-orange)", textTransform: "uppercase", letterSpacing: 0.4, marginTop: 4 }}>{tool.subtitle}</div>
                    </div>
                    <p style={{ fontSize: "0.8rem", color: "var(--grey-500)", lineHeight: 1.7, flex: 1 }}>{tool.description}</p>
                    {tool.useWhen && (
                      <div style={{ fontSize: "0.72rem", color: "var(--grey-400)", lineHeight: 1.6, borderTop: "1px solid var(--grey-200)", paddingTop: 12, marginTop: 4 }}>
                        <div style={{ marginBottom: 4 }}><span style={{ fontWeight: 600, color: "var(--grey-500)" }}>Use when:</span> {tool.useWhen}</div>
                        {tool.estimatedTime && (<div><span style={{ fontWeight: 600, color: "var(--grey-500)" }}>⏱</span> {tool.estimatedTime}</div>)}
                      </div>
                    )}
                    {isLive && (<div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: "0.76rem", fontWeight: 600, color: "var(--pwc-orange)" }}>Open tool <span>→</span></div>)}
                  </div>
                );
              })}
            </div>
            <Footer />
          </main>
        );
      }

      function ToolPage({ badge, title, description, toolRoute, questionsConfig, getFlowFn, getOutcomeFn, outcomesDatabase, trailLabels, initialAnswerState }) {
        const [answersState, setAnswersState] = useState(initialAnswerState || {});
        const [mobileSheetOpen, setMobileSheetOpen] = useState(false);
        const { showToast, ToastElement } = useToast();
        const questionFlow = useMemo(() => getFlowFn(answersState), [answersState, getFlowFn]);
        const outcomeKey = getOutcomeFn(answersState);
        const outcomeData = outcomeKey ? outcomesDatabase[outcomeKey] : null;
        const nextUnansweredId = questionFlow.find((qId) => answersState[qId] === undefined);
        const answeredCount = questionFlow.filter((qId) => answersState[qId] !== undefined).length;
        const isComplete = outcomeKey !== null;

        useEffect(() => { const encoded = encodeStateToHash(toolRoute, answersState); if (window.location.hash.slice(1) !== encoded) { window.history.replaceState(null, "", `#${encoded}`); } }, [answersState, toolRoute]);

        const handleAnswer = useCallback((questionId, value) => {
          setAnswersState((prev) => {
            const next = { ...prev, [questionId]: value };
            const newFlow = getFlowFn(next);
            const currentIndex = newFlow.indexOf(questionId);
            Object.keys(next).forEach((key) => { if (key === questionId) return; const keyIndex = newFlow.indexOf(key); if (keyIndex === -1 || keyIndex > currentIndex) { delete next[key]; } });
            return next;
          });
        }, [getFlowFn]);

        const handleEdit = useCallback((questionId) => {
          setAnswersState((prev) => {
            const next = { ...prev };
            const currentFlow = getFlowFn(prev);
            const editIndex = currentFlow.indexOf(questionId);
            currentFlow.forEach((qId, index) => { if (index >= editIndex) { delete next[qId]; } });
            return next;
          });
          setTimeout(() => { const element = document.getElementById(`question-${questionId}`); if (element) { element.scrollIntoView({ behavior: "smooth", block: "center" }); } }, 100);
        }, [getFlowFn]);

        const handleStartOver = useCallback(() => { setAnswersState({}); setMobileSheetOpen(false); window.scrollTo({ top: 0, behavior: "smooth" }); }, []);

        const handleCopyLink = useCallback(() => {
          const url = window.location.href;
          navigator.clipboard.writeText(url).then(() => { showToast("🔗 Link copied to clipboard"); }).catch(() => { const textArea = document.createElement("textarea"); textArea.value = url; document.body.appendChild(textArea); textArea.select(); document.execCommand("copy"); document.body.removeChild(textArea); showToast("🔗 Link copied to clipboard"); });
        }, [showToast]);

        const handleExportPdf = useCallback(() => {
          if (!outcomeData) return;
          const answeredSteps = questionFlow.filter((qId) => answersState[qId] !== undefined);
          const pathHtml = answeredSteps.map((qId) => { const answer = answersState[qId]; const label = trailLabels[qId] || qId; const question = questionsConfig[qId]; const displayValue = question.type === "choice" ? question.choices.find((c) => c.value === answer)?.shortLabel || answer : answer; return `<span class="path-step">${label}: <strong>${displayValue}</strong></span>`; }).join('<span class="path-arrow"> → </span>');
          const outcomeHtml = `<div class="outcome-tag">${outcomeData.tag}</div>${outcomeData.html}`;
          exportToPdf(title, pathHtml, outcomeHtml);
          showToast("📄 PDF export opened in new tab");
        }, [outcomeData, questionFlow, answersState, trailLabels, questionsConfig, title, showToast]);

        let displayNumber = 0;

        const mobilePanelContent = (
          <>
            {Object.keys(answersState).length > 0 && (<DecisionPath flow={questionFlow} answersState={answersState} questionsConfig={questionsConfig} trailLabels={trailLabels} />)}
            {outcomeData ? (
              <div>
                <span style={{ display: "inline-block", padding: "6px 16px", borderRadius: 10, fontSize: "0.76rem", fontWeight: 700, marginBottom: 18, textTransform: "uppercase", letterSpacing: 0.3, background: outcomeData.tagBackground, color: outcomeData.tagColor, border: `1px solid ${outcomeData.tagColor}22` }}>{outcomeData.tag}</span>
                <div className="answer-content" dangerouslySetInnerHTML={{ __html: outcomeData.html }} />
                {outcomeData.isCatchAll && (<div className="callout info" style={{ marginTop: 20 }}><strong>Need help?</strong> Your scenario may require bespoke advice. Contact your PwC engagement team for tailored guidance.</div>)}
                <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
                  <button onClick={handleCopyLink} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "1.5px solid var(--grey-200)", background: "white", fontSize: "0.78rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>🔗 Copy Link</button>
                  <button onClick={handleExportPdf} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "1.5px solid var(--pwc-orange)", background: "var(--pwc-orange-soft)", color: "var(--pwc-orange)", fontSize: "0.78rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>📄 Export</button>
                </div>
              </div>
            ) : (<div style={{ textAlign: "center", padding: "20px 0" }}><p style={{ fontSize: "0.85rem", color: "var(--grey-400)" }}>Continue answering questions to see the analysis.</p></div>)}
          </>
        );

        return (
          <main style={{ maxWidth: "var(--max-width)", margin: "0 auto", padding: "28px 24px 120px" }}>
            {ToastElement}
            <PageHero badge={badge} title={title} description={description} />
            <ProgressBar answeredCount={answeredCount} totalCount={questionFlow.length} isComplete={isComplete} onRestart={handleStartOver} />
            <div className="main-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 32, alignItems: "start" }}>
              <div>
                {questionFlow.map((questionId) => {
                  displayNumber++;
                  const isAnswered = answersState[questionId] !== undefined;
                  const isActive = questionId === nextUnansweredId || isAnswered;
                  return (<div key={questionId} id={`question-${questionId}`}><QuestionCard questionId={questionId} displayNumber={displayNumber} questionConfig={questionsConfig[questionId]} currentAnswer={answersState[questionId]} isActive={isActive} isAnswered={isAnswered} onAnswer={handleAnswer} onEdit={() => handleEdit(questionId)} /></div>);
                })}
                {answeredCount > 0 && (<StartOverButton onClick={handleStartOver} />)}
              </div>
              <AnswerPanel answersState={answersState} questionFlow={questionFlow} questionsConfig={questionsConfig} getOutcomeFn={getOutcomeFn} outcomesDatabase={outcomesDatabase} trailLabels={trailLabels} toolTitle={title} onCopyLink={handleCopyLink} onExportPdf={handleExportPdf} />
            </div>
            <MobileBottomSheet isOpen={mobileSheetOpen} onClose={() => setMobileSheetOpen(!mobileSheetOpen)} answeredCount={answeredCount} totalCount={questionFlow.length} isComplete={isComplete}>{mobilePanelContent}</MobileBottomSheet>
            <Footer />
          </main>
        );
      }

      /* ================================================================
   ================================================================

   SECTION E — APPLICATION ROOT

   ================================================================
   ================================================================ */

      function App() {
        const { route, navigate, initialUrlState } = useRouter();

        const renderPage = () => {
          switch (route) {
            case "/land-sale":
              return (
                <ToolPage key="land-sale" badge="🏗️ Land Sale · Decision Tool" title="Land Sale — VAT Treatment" description="Walk through the questions below to determine the VAT treatment on a sale of land. Hover over highlighted terms for definitions. Click ✏️ Edit on any answered question to change it." toolRoute="/land-sale" questionsConfig={LAND_SALE_QUESTIONS} getFlowFn={getLandSaleFlow} getOutcomeFn={getLandSaleOutcome} outcomesDatabase={LAND_SALE_OUTCOMES} trailLabels={LAND_SALE_TRAIL_LABELS} initialAnswerState={initialUrlState} />
              );
            case "/commercial-property":
              return (
                <ToolPage key="commercial-property" badge="🏢 Commercial Property · Sale Decision Tool" title="Commercial Property — VAT Treatment" description="Determine the VAT treatment on the sale of a completed or incomplete commercial property. Covers TOB relief, CGS implications, JOTT, and VAT recovery on sale costs." toolRoute="/commercial-property" questionsConfig={COMMERCIAL_PROPERTY_QUESTIONS} getFlowFn={getCommercialPropertyFlow} getOutcomeFn={getCommercialPropertyOutcome} outcomesDatabase={COMMERCIAL_PROPERTY_OUTCOMES} trailLabels={COMMERCIAL_PROPERTY_TRAIL_LABELS} initialAnswerState={initialUrlState} />
              );
            case "/rct":
              return (
                <ToolPage key="rct" badge="🔨 Relevant Contracts Tax · RCT Decision Tool" title="Relevant Contracts Tax (RCT)" description="Determine if RCT applies to a payment to a subcontractor, identify the correct withholding rate (0%, 20%, or 35%), and understand your eRCT compliance obligations under Chapter 2 of Part 18 TCA 1997." toolRoute="/rct" questionsConfig={RCT_QUESTIONS} getFlowFn={getRctFlow} getOutcomeFn={getRctOutcome} outcomesDatabase={RCT_OUTCOMES} trailLabels={RCT_TRAIL_LABELS} initialAnswerState={initialUrlState} />
              );
            default:
              return <HomePage navigate={navigate} />;
          }
        };

        return (
          <div>
            <BrandBar navigate={navigate} currentRoute={route} />
            {renderPage()}
          </div>
        );
      }

      /* ================================================================
   MOUNT
   ================================================================ */

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
